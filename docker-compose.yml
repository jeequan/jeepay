networks:
  jeepay:
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mysql:
  redis:
  rocketmq_namesrv_logs:
  rocketmq_broker_logs:
  rocketmq_broker_store:
#  rabbitmq:
