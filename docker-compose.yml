  #    RABBITMQ_DEFAULT_VHOST: 'jeepay'
  #  volumes:
  #    - rabbitmq:/var/lib/rabbitmq
  #  networks:
  #    jeepay:
  #      ipv4_address: 172.20.0.14

  # 如需回退 ActiveMQ，可启用下面服务并同步修改 conf/*.yml 中的 MQ 配置。
  #activemq:
  #  build:
  #    context: ./docker/activemq
  #    dockerfile: Dockerfile
