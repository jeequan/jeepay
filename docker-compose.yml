  #  volumes:
  #    - activemq:/opt/activemq
  #    - ./docker/activemq/activemq.xml:/opt/activemq/conf/activemq.xml
  #  networks:
  #    jeepay:
  #      ipv4_address: 172.20.0.15

  redis:
    hostname: redis
    container_name: jeepay-redis
    restart: always
    image: redis:latest
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - redis:/data
    networks:
      jeepay:
        ipv4_address: 172.20.0.12

  payment:
    build:
      context: ./jeepay-payment
      dockerfile: Dockerfile
    image: jeepay-payment:latest
    hostname: payment
    container_name: jeepay-payment
    restart: always
    ports:
      - "9216:9216"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rocketmq-broker:
        condition: service_healthy
    volumes:
      - ./logs/payment:/jeepayhomes/service/logs
      - ./conf/payment/application.yml:/jeepayhomes/service/app/application.yml
    networks:
      jeepay:
        ipv4_address: 172.20.0.21

  manager:
    build:
      context: ./jeepay-manager
      dockerfile: Dockerfile
    image: jeepay-manager:latest
    hostname: manager
    container_name: jeepay-manager
    restart: always
    ports:
      - "9217:9217"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rocketmq-broker:
        condition: service_healthy
    volumes:
      - ./logs/manager:/jeepayhomes/service/logs
      - ./conf/manager/application.yml:/jeepayhomes/service/app/application.yml
    networks:
      jeepay:
        ipv4_address: 172.20.0.22

  merchant:
    build:
      context: ./jeepay-merchant
      dockerfile: Dockerfile
    image: jeepay-merchant:latest
    hostname: merchant
    container_name: jeepay-merchant
    restart: always
    ports:
      - "9218:9218"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rocketmq-broker:
        condition: service_healthy
    volumes:
      - ./logs/merchant:/jeepayhomes/service/logs
      - ./conf/merchant/application.yml:/jeepayhomes/service/app/application.yml
    networks:
      jeepay:
        ipv4_address: 172.20.0.23

  ui-payment:
    build:
      context: ${UI_BASE_DIR:-..}/jeepay-ui
      dockerfile: Dockerfile
      args:
        PLATFORM: cashier
    image: jeepay-ui-payment:latest
    hostname: payment-ui
    container_name: jeepay-ui-payment
    restart: always
    environment:
      - BACKEND_HOST=172.20.0.21:9216
    ports:
      - "9226:80"
    depends_on:
      payment:
        condition: service_healthy
    networks:
      jeepay:
        ipv4_address: 172.20.0.31

  ui-manager:
    build:
      context: ${UI_BASE_DIR:-..}/jeepay-ui
      dockerfile: Dockerfile
      args:
        PLATFORM: manager
    image: jeepay-ui-manager:latest
    hostname: manager-ui
    container_name: jeepay-ui-manager
    restart: always
    environment:
      - BACKEND_HOST=172.20.0.22:9217
    ports:
      - "9227:80"
    depends_on:
      manager:
        condition: service_healthy
    networks:
      jeepay:
        ipv4_address: 172.20.0.32

  ui-merchant:
    build:
      context: ${UI_BASE_DIR:-..}/jeepay-ui
      dockerfile: Dockerfile
      args:
        PLATFORM: merchant
    image: jeepay-ui-merchant:latest
    hostname: merchant-ui
    container_name: jeepay-ui-merchant
    restart: always
    environment:
      - BACKEND_HOST=172.20.0.23:9218
    ports:
      - "9228:80"
    depends_on:
      merchant:
        condition: service_healthy
    networks:
      jeepay:
        ipv4_address: 172.20.0.33

  # 如果你需要对外完整配置，可以使用下面的方式
