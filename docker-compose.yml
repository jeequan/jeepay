# Maven 依赖提前编译，修改 MQ 队列 (修改 jeepay-components-mq 依赖) 也需要重新运行此命令
# 启动命令 docker compose up
# 启动并运行在后台  docker compose up -d
# 重新编译 docker compose up --build
# 重新创建 docker compose up --force-recreate
# 重新编译并覆盖之前的 docker compose up --build --force-recreate
#
# 前端目录默认使用本仓库同级的 ../jeepay-ui，可在 .env 中覆盖 UI_BASE_DIR。

services:
  mysql:
    hostname: mysql
    container_name: jeepay-mysql
    restart: always
    image: mysql:8
    environment:
      LANG: C.UTF-8
      MYSQL_ROOT_PASSWORD: "rootroot"
      MYSQL_DATABASE: "jeepaydb"
      MYSQL_USER: "jeepay"
      MYSQL_PASSWORD: "jeepay"
    ports:
      - "13306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - mysql:/var/lib/mysql
      - ./docs/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./docs/sql/patch.sql:/docker-entrypoint-initdb.d/02-patch.sql:ro
    networks:
      jeepay:
        ipv4_address: 172.20.0.10

  # 使用 RocketMQ 作为默认 MQ 方案
  rocketmq-namesrv:
    image: apache/rocketmq:5.3.1
    hostname: rocketmq-namesrv
    container_name: jeepay-rocketmq-namesrv
    restart: always
    user: "0:0"
    ports:
      - "9876:9876"
    environment:
      # 开发环境降低 NameServer 内存占用
      HEAP_OPTS: "-Xms256m -Xmx256m -Xmn128m"
    command: sh mqnamesrv
    healthcheck:
      # arm64 模拟 amd64 时 bash 启动较慢，需增大超时
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9876'"]
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 40s
    volumes:
      - rocketmq_namesrv_logs:/home/rocketmq/logs
    networks:
      jeepay:
        ipv4_address: 172.20.0.11

  rocketmq-broker:
    image: apache/rocketmq:5.3.1
    hostname: rocketmq-broker
    container_name: jeepay-rocketmq-broker
    restart: always
    # Docker 创建的 named volume 默认 root 权限，而镜像以 rocketmq(uid=3000) 运行，需要提权
    user: "0:0"
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
      # 开发环境限制 Broker 堆内存，默认 2g+1g 在 Docker Desktop 上容易 OOM
      JAVA_OPT_EXT: "-Xms512m -Xmx512m -Xmn256m"
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/rocketmq-5.3.1/conf/broker.conf
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/10911'"]
      interval: 15s
      timeout: 15s
      retries: 15
      start_period: 120s
    volumes:
      - rocketmq_broker_logs:/home/rocketmq/logs
      - rocketmq_broker_store:/home/rocketmq/store
      - ./docker/rocketmq/broker/conf/broker.conf:/home/rocketmq/rocketmq-5.3.1/conf/broker.conf:ro
    networks:
      jeepay:
        ipv4_address: 172.20.0.13

  # 扩展额外延迟插件的 RabbitMQ
  #rabbitmq:
