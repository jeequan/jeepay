[[services.volume]]
mountPath = "/jeepayhomes/service/logs"
name = "logs_manager"

[[services.volume]]
mountPath = "/jeepayhomes/service/uploads"
name = "uploads_manager"

# ==================== Jeepay Merchant (Merchant Portal) ====================
