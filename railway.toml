# ==================== Nginx Reverse Proxy ====================
[[services]]
name = "nginx"
image = "nginx:alpine"
internalPort = 80

[services.resources]
cpu = "0.25"
memory = "256MiB"

[services.healthCheck]
path = "/"
port = 80
interval = "10s"
timeout = "5s"

[[services.ports]]
port = 80
protocol = "http"

[[services.ports]]
port = 443
protocol = "https"

[[services.volume]]
mountPath = "/etc/nginx/conf.d"
name = "nginx_config"

[[services.volume]]
mountPath = "/var/log/nginx"
name = "nginx_logs"

# ==================== Network Configuration ====================
[networks]
type = "public"

# ==================== Regional Settings ====================
[settings]
region = "us-east"
# Region options: us-east, us-west, europe-west, asia-east, asia-south
