[[services.env]]
key = "SPRING_DATASOURCE_USERNAME"
value = "root"

[[services.env]]
key = "SPRING_DATASOURCE_PASSWORD"
value = "root123456"

[[services.env]]
key = "SPRING_DATA_REDIS_HOST"
value = "redis"

[[services.env]]
key = "SPRING_DATA_REDIS_PORT"
value = "6379"

[[services.env]]
key = "SPRING_RABBITMQ_HOST"
value = "rabbitmq"

[[services.env]]
key = "SPRING_RABBITMQ_PORT"
value = "5672"

[[services.env]]
key = "SPRING_RABBITMQ_USERNAME"
value = "admin"

[[services.env]]
key = "SPRING_RABBITMQ_PASSWORD"
value = "admin123"

[[services.env]]
key = "SPRING_RABBITMQ_VIRTUAL_HOST"
