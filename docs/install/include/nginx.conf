
# 官方默认配置文件， 下载地址： https://nginx.org/download/nginx-1.18.0.tar.gz
#user  nobody;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # 运营平台
    server {
        listen       19217; #监听端口，若监听域名请添加 server_name
        root /usr/share/nginx/html/jeepaymanager;
        index index.html index.htm;

        #解决vue刷新404问题
        try_files $uri $uri/ /index.html;

        # 主页面不允许缓存（避免项目升级 空白页的问题）
        location /index.html {
          add_header Expires -1;
          add_header Cache-Control no-cache;
        }

        location /api/
        {
            proxy_next_upstream http_502 http_504 error timeout invalid_header;
            proxy_set_header Host  $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # 透传真实协议/端口，配合外层 HTTPS 反代与 Spring Boot 的
            # forward-headers-strategy 一起使用，避免回调 / return_url 被拼成 http。
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_pass http://localhost:9217;
            # WebSocket 支持：HTTP/1.1 是 Upgrade 协议的前置条件（默认是 1.0 会提前断开）；
            # 订单状态 / 长连接推送场景下必须把 proxy_read/send_timeout 放大到小时级。
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }


    # 商户平台
    server {
        listen       19218; #监听端口，若监听域名请添加 server_name
        root /usr/share/nginx/html/jeepaymerchant;
        index index.html index.htm;

        #解决vue刷新404问题
        try_files $uri $uri/ /index.html;

        # 主页面不允许缓存（避免项目升级 空白页的问题）
        location /index.html {
          add_header Expires -1;
          add_header Cache-Control no-cache;
        }

        location /api/
        {
            proxy_next_upstream http_502 http_504 error timeout invalid_header;
            proxy_set_header Host  $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_pass http://localhost:9218;
            # WebSocket 支持：商户端支付测试页通过 ws://.../api/anon/ws/payOrder/...
            # 订阅订单状态变化，必须开 HTTP/1.1 + 长超时。
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }


    # 支付网关（含收银台静态资源，由 jeepay-payment Spring Boot 服务自带）
    server {
        listen       19216; #监听端口，若监听域名请添加 server_name
        location /
        {
            proxy_next_upstream http_502 http_504 error timeout invalid_header;
            proxy_set_header Host  $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # 外层 HTTPS 反代场景必备：让 Spring Boot 拼对收银台 return_url 与支付回调地址
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_pass http://localhost:9216;
            # WebSocket 支持：收银台轮询订单状态可能走 WS；保持 HTTP/1.1 + 长超时。
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }

}
